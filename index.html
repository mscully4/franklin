<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Franklin</title>
  <link rel="icon" type="image/png" href="/avatar.png">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
      --purple: #bc8cff;
      --orange: #f0883e;
      --cyan: #39d2c0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
    header h1 img { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); }
    #header-metrics { display: flex; align-items: center; gap: 16px; }
    .hm { display: flex; align-items: center; gap: 4px; font-size: 12px; }
    .hm-emoji { font-size: 14px; }
    .hm-val { font-weight: 700; }
    .hm-week { color: var(--muted); font-size: 10px; }
    #refresh { font-size: 11px; color: var(--muted); }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr 280px;
      gap: 1px;
      background: var(--border);
      min-height: calc(100vh - 41px);
    }
    .col { background: var(--surface); padding: 14px 16px; overflow-y: auto; }

    .section-title {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .section + .section { margin-top: 20px; }

    .status-line { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .dot-red { background: var(--red); }
    .dot-yellow { background: var(--yellow); }
    .kv { margin-bottom: 4px; }
    .kv-label { color: var(--muted); }
    .kv-value { color: var(--text); }

    .tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .tag-green { background: rgba(63,185,80,.15); color: var(--green); }
    .tag-red { background: rgba(248,81,73,.15); color: var(--red); }
    .tag-yellow { background: rgba(210,153,34,.15); color: var(--yellow); }
    .tag-blue { background: rgba(88,166,255,.15); color: var(--blue); }
    .tag-purple { background: rgba(188,140,255,.15); color: var(--purple); }
    .tag-cyan { background: rgba(57,210,192,.15); color: var(--cyan); }
    .tag-orange { background: rgba(240,136,62,.15); color: var(--orange); }
    .claim-btn {
      display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px;
      font-weight: 600; letter-spacing: 0.3px; cursor: pointer; border: none;
      font-family: inherit;
    }
    .claim-btn.unclaimed { background: rgba(139,148,158,.1); color: var(--muted); }
    .claim-btn.unclaimed:hover { background: rgba(139,148,158,.25); color: var(--text); }
    .claim-btn.claimed { background: rgba(210,153,34,.15); color: var(--yellow); }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .row:last-child { border-bottom: none; }

    .quest-card {
      border: 1px solid var(--border);
      border-radius: 5px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .quest-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .quest-id { color: var(--purple); font-weight: 600; }
    .quest-age { color: var(--muted); font-size: 11px; }
    .quest-obj { padding: 7px 10px; font-size: 12px; color: var(--text); }
    .quest-logs { padding: 0 10px 7px; }
    .log-entry {
      padding: 3px 0;
      border-top: 1px solid var(--border);
      font-size: 11px;
      line-height: 1.4;
    }
    .log-ago { color: var(--muted); margin-right: 5px; }
    .log-action { color: var(--orange); margin-right: 5px; }

    .quest-completed-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px; }
    .quest-completed-toggle { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
    .quest-completed-toggle:hover { color: var(--text); }
    .quest-card-completed {
      border: 1px solid var(--border); border-radius: 5px; margin-bottom: 8px;
      overflow: hidden; opacity: 0.55; transition: opacity 0.15s ease;
    }
    .quest-card-completed:hover { opacity: 0.85; }
    .quest-card-completed .quest-head { padding: 5px 10px; }
    .quest-detail {
      padding: 4px 10px; font-size: 11px; color: var(--muted); cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4;
      border-top: 1px solid var(--border);
    }
    .quest-detail.expanded { white-space: normal; }
    .quest-detail-label { color: var(--purple); font-weight: 600; margin-right: 4px; }

    .dispatch-row {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .dispatch-row:last-child { border-bottom: none; }
    .dispatch-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .dispatch-summary {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .side-row {
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .side-row:last-child { border-bottom: none; }
    .side-muted { color: var(--muted); font-size: 11px; margin-top: 1px; }
    .hidden { display: none; }

    .empty { color: var(--muted); font-style: italic; font-size: 12px; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .kanban { display: flex; gap: 8px; overflow-x: auto; }
    .kanban-col { flex: 1; min-width: 140px; }
    .kanban-header {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted); font-weight: 600; margin-bottom: 6px;
      display: flex; align-items: center; gap: 5px;
    }
    .kanban-header .tag { font-size: 9px; }
    .kanban-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      margin-bottom: 6px;
      background: var(--bg);
      font-size: 11px;
      line-height: 1.4;
    }
    .kanban-card:hover { border-color: var(--muted); }
    .kanban-card-key { font-weight: 600; }
    .kanban-card-summary {
      color: var(--text); margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .kanban-card-meta { color: var(--muted); font-size: 10px; margin-top: 3px; }
    .kanban-col--blue .kanban-card { border-left: 2px solid var(--blue); }
    .kanban-col--purple .kanban-card { border-left: 2px solid var(--purple); }
    .kanban-col--cyan .kanban-card { border-left: 2px solid var(--cyan); }
    .kanban-col--yellow .kanban-card { border-left: 2px solid var(--yellow); }

    .metric-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 3px 0; font-size: 12px;
    }
    .metric-val { font-weight: 700; }
    @keyframes fadein { from { opacity: 0.4; } to { opacity: 1; } }
    .flash { animation: fadein 0.4s ease; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 520px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .modal-head h2 { font-size: 14px; font-weight: 600; }
    .modal-close {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 18px; line-height: 1; padding: 0 4px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-section { margin-bottom: 12px; }
    .modal-section-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--muted); font-weight: 600; margin-bottom: 6px;
    }
    .modal-kv {
      display: flex; justify-content: space-between; gap: 12px;
      padding: 4px 0; border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .modal-kv:last-child { border-bottom: none; }
    .modal-kv-label { color: var(--muted); white-space: nowrap; }
    .modal-kv-value { color: var(--text); text-align: right; word-break: break-word; }
  </style>
</head>
<body>
  <header>
    <h1><img src="/avatar.png" alt="Franklin">Franklin</h1>
    <div id="header-metrics"></div>
    <div class="hm" title="DeepSeek account balance" style="font-size:12px">
      <span class="hm-emoji">💰</span>
      <span class="hm-val" id="deepseek-balance" style="color:var(--yellow)">…</span>
    </div>
    <div id="refresh">loading...</div>
  </header>

  <div class="modal-overlay" id="quest-modal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal" style="max-width:600px">
      <div class="modal-head">
        <h2 id="quest-modal-title"></h2>
        <button class="modal-close" onclick="document.getElementById('quest-modal').classList.remove('open')">&times;</button>
      </div>
      <pre id="quest-modal-body" style="font-size:11px;color:var(--text);overflow:auto;max-height:70vh;margin:0;padding:10px;background:var(--card);border-radius:6px;white-space:pre-wrap;word-break:break-word"></pre>
    </div>
  </div>

  <div class="modal-overlay" id="deploy-modal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal">
      <div class="modal-head">
        <h2 id="deploy-modal-title"></h2>
        <button class="modal-close" onclick="document.getElementById('deploy-modal').classList.remove('open')">&times;</button>
      </div>
      <div id="deploy-modal-body"></div>
    </div>
  </div>

  <div class="layout">
    <div class="col" id="col-left"></div>
    <div class="col" id="col-main"></div>
    <div class="col" id="col-right"></div>
  </div>

  <script>
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function toggleClaim(signalId, currently_claimed) {
      const method = currently_claimed ? 'DELETE' : 'POST';
      await fetch('/api/claim-pr', { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify({ signalId }) });
      refresh();
    }

    function timeAgoClient(iso) {
      if (!iso) return 'never';
      const s = (Date.now() - new Date(iso).getTime()) / 1000;
      if (s < 60) return `${Math.floor(s)}s ago`;
      if (s < 3600) return `${Math.floor(s / 60)}m ago`;
      if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
      return `${Math.floor(s / 86400)}d ago`;
    }

    function showQuestJson(raw) {
      document.getElementById('quest-modal-title').textContent = raw.id ?? 'Quest';
      document.getElementById('quest-modal-body').textContent = JSON.stringify(raw, null, 2);
      document.getElementById('quest-modal').classList.add('open');
    }

    function showDeployModal(idx) {
      const dep = window.__deploys[idx];
      if (!dep) return;
      const DEPLOY_ST = {
        pending:  { icon: '🔶', cls: 'tag-yellow' },
        approved: { icon: '✅', cls: 'tag-green' },
      };
      const r = DEPLOY_ST[dep.status] ?? DEPLOY_ST.pending;
      document.getElementById('deploy-modal-title').innerHTML =
        `${r.icon} ${esc(dep.service)} <span class="tag ${r.cls}" style="margin-left:8px">${esc(dep.status ?? 'pending')}</span>`;

      let body = '';

      // Summary row
      body += `<div class="modal-section">`;
      if (dep.requester) body += `<div class="modal-kv"><span class="modal-kv-label">Requester</span><span class="modal-kv-value">${esc(dep.requester)}</span></div>`;
      body += `<div class="modal-kv"><span class="modal-kv-label">Time</span><span class="modal-kv-value">${esc(dep.createdAgo)}</span></div>`;
      if (dep.message_url) body += `<div class="modal-kv"><span class="modal-kv-label">Message</span><span class="modal-kv-value"><a href="${esc(dep.message_url)}">View message</a></span></div>`;
      body += `</div>`;

      // Description
      if (dep.description) {
        body += `<div class="modal-section"><div class="modal-section-title">Description</div><div style="font-size:12px;color:var(--text)">${esc(dep.description)}</div></div>`;
      }

      // Evidence
      if (dep.evidence) {
        body += `<div class="modal-section"><div class="modal-section-title">Evidence</div>`;
        try {
          const ev = typeof dep.evidence === 'string' ? JSON.parse(dep.evidence) : dep.evidence;
          for (const [k, v] of Object.entries(ev)) {
            const label = k.replace(/_/g, ' ');
            let val;
            if (typeof v === 'object' && v !== null) {
              // Render nested objects as sub-rows
              val = Object.entries(v).map(([sk, sv]) => `${esc(sk)}: ${esc(String(sv))}`).join('<br>');
            } else {
              val = esc(String(v));
            }
            body += `<div class="modal-kv"><span class="modal-kv-label">${esc(label)}</span><span class="modal-kv-value">${val}</span></div>`;
          }
        } catch {
          body += `<div style="font-size:12px;color:var(--text);white-space:pre-wrap">${esc(String(dep.evidence))}</div>`;
        }
        body += `</div>`;
      }

      document.getElementById('deploy-modal-body').innerHTML = body;
      document.getElementById('deploy-modal').classList.add('open');
    }

    const STATUS_TAG = {
      ok:         'tag-green',
      skipped:    'tag-blue',
      error:      'tag-red',
      timeout:    'tag-red',
      no_worker:  'tag-yellow',
      needs_info: 'tag-cyan',
    };

    function renderLeft(d) {
      // Process status
      const processDot = d.running
        ? `<span class="dot dot-green"></span><span style="color:var(--green)">RUNNING</span>`
        : `<span class="dot dot-red"></span><span style="color:var(--red)">STOPPED</span>`;

      // Socket status
      const socketOk = d.socketStatus === 'connected' && !d.socketStale;
      const socketDot = socketOk
        ? `<span class="dot dot-green"></span><span style="color:var(--green)">connected</span>`
        : `<span class="dot dot-red"></span><span style="color:var(--red)">${esc(d.socketStatus)}</span>`;

      // Scouts
      const scouts = d.scouts.map(s => `
        <div class="row">
          <span style="color:var(--blue);font-size:12px">${s.name}</span>
          <span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
            <span style="color:var(--muted);font-size:11px">${s.lastAgo}</span>
            <span class="tag ${s.overdue ? 'tag-yellow' : 'tag-green'}">${s.overdue ? 'overdue' : 'ok'}</span>
          </span>
        </div>
      `).join('');

      // Scheduled tasks — preserve expanded state across refreshes
      const expandedTasks = new Set(
        document.querySelectorAll('.sched-detail:not(.hidden)')
      );
      const expandedIds = new Set();
      expandedTasks.forEach(el => {
        const row = el.closest('.side-row');
        if (row) expandedIds.add(row.dataset.taskId);
      });

      const scheduledRows = (d.scheduledTasks ?? []).map(t => {
        const kindTag = t.kind === 'script'
          ? '<span title="script">⚡</span>'
          : '<span title="worker">🧠</span>';
        const detailClass = expandedIds.has(t.id) ? 'sched-detail' : 'sched-detail hidden';
        return `
          <div class="side-row" data-task-id="${esc(t.id)}" style="cursor:pointer" onclick="this.querySelector('.sched-detail').classList.toggle('hidden')">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="color:var(--cyan);font-weight:600">${esc(t.id)}</span>
              <span style="display:flex;gap:4px">${kindTag}<span class="tag tag-purple">${esc(t.every)}</span></span>
            </div>
            <div class="${detailClass}">
              <div class="side-muted">${esc(t.description)}</div>
              <div class="side-muted">last run: ${esc(t.lastRunAgo)}</div>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('col-left').innerHTML = `
        <div class="section">
          <div class="section-title">Process</div>
          <div class="status-line">${processDot}</div>
          <div class="kv"><span class="kv-label">heartbeat </span><span class="kv-value">${d.heartbeatAgo}</span></div>
          <div class="kv"><span class="kv-label">last cycle </span><span class="kv-value">${d.lastCycleAgo}</span></div>
        </div>
        <div class="section">
          <div class="section-title">Socket</div>
          <div class="status-line">${socketDot}</div>
          <div class="kv"><span class="kv-label">updated </span><span class="kv-value">${d.socketAgo}</span></div>
        </div>
        <div class="section">
          <div class="section-title">Scouts</div>
          ${scouts}
        </div>
        <div class="section">
          <div class="section-title">Scheduled Tasks</div>
          ${scheduledRows || '<div class="empty">None configured</div>'}
        </div>
      `;
    }

    function renderMain(d) {
      // Active quests
      window.__questRaw = [];
      const questCards = d.activeQuests.map((q, i) => {
        window.__questRaw.push(q.raw);
        const tags = [
          q.agentStatus === 'running' ? `<span class="tag tag-green">running</span>` : '',
          `<span class="tag tag-purple">${esc(q.status)}</span>`,
          q.prUrl ? `<a href="${esc(q.prUrl)}" target="_blank" class="tag tag-blue">PR</a>` : '',
        ].filter(Boolean).join(' ');

        const logs = q.recentLogs.map(l => `
          <div class="log-entry">
            <span class="log-ago">${l.ago}</span>
            <span class="log-action">[${esc(l.action)}]</span>
            <span>${esc(l.summary)}</span>
          </div>
        `).join('');

        const jsonIdx = window.__questRaw.length - 1;
        return `
          <div class="quest-card">
            <div class="quest-head">
              <span><span class="quest-id">${esc(q.id)}</span> <span class="quest-age">${q.createdAgo}</span></span>
              <span><span class="tag" style="cursor:pointer;font-size:11px" onclick="showQuestJson(window.__questRaw[${jsonIdx}])" title="View JSON">{ }</span> ${tags}</span>
            </div>
            <div class="quest-obj">${esc(q.objective)}</div>
            ${logs ? `<div class="quest-logs">${logs}</div>` : ''}
          </div>
        `;
      }).join('');

      // Completed quests (collapsible)
      const completedCards = (d.completedQuests ?? []).map(q => {
        const jsonIdx = window.__questRaw.length;
        window.__questRaw.push(q.raw);
        const statusTag = q.status === 'completed'
          ? '<span class="tag tag-green">completed</span>'
          : `<span class="tag tag-red">${esc(q.status)}</span>`;
        const prTag = q.prUrl ? ` <a href="${esc(q.prUrl)}" target="_blank" class="tag tag-blue">PR</a>` : '';
        return `
          <div class="quest-card-completed" style="cursor:pointer" onclick="this.querySelectorAll('.quest-detail').forEach(el=>el.classList.toggle('expanded'))">
            <div class="quest-head">
              <span><span class="quest-id">${esc(q.id)}</span> <span class="quest-age">${q.updatedAgo}</span></span>
              <span><span class="tag" style="cursor:pointer;font-size:11px" onclick="event.stopPropagation();showQuestJson(window.__questRaw[${jsonIdx}])" title="View JSON">{ }</span> ${statusTag}${prTag}</span>
            </div>
            <div class="quest-detail"><span class="quest-detail-label">objective</span> ${esc(q.objective)}</div>
            ${q.outcome ? `<div class="quest-detail"><span class="quest-detail-label">outcome</span> ${esc(q.outcome)}</div>` : ''}
          </div>
        `;
      }).join('');

      // Recent dispatches
      const dispatchRows = (d.recentDispatches ?? []).slice(0, 15).map(r => {
        const cls = STATUS_TAG[r.status] ?? 'tag-blue';
        return `
          <div class="dispatch-row">
            <div class="dispatch-header">
              <span>
                <span style="color:var(--orange)">${esc(r.type)}</span>
                <span style="color:var(--muted);font-size:11px;margin-left:6px">${esc(r.task_id)}</span>
              </span>
              <span style="display:flex;align-items:center;gap:6px">
                <span class="tag ${cls}">${esc(r.status)}</span>
                <span style="color:var(--muted);font-size:11px">${esc(r.completedAgo)}</span>
              </span>
            </div>
            ${r.summary ? `<div class="dispatch-summary">${esc(r.summary)}</div>` : ''}
          </div>
        `;
      }).join('');

      // Preserve completed-quests collapse state across refreshes
      const completedWasHidden = document.getElementById('completed-quests-list')?.classList.contains('hidden') ?? false;

      document.getElementById('col-main').innerHTML = `
        <div class="section">
          <div class="section-title">Jira Tickets${d.jiraTickets?.length ? ` <span class="tag tag-blue">${d.jiraTickets.length}</span>` : ''}</div>
          ${renderJiraTickets(d)}
        </div>
        <div class="section">
          <div class="section-title">Quests${d.activeQuests.length ? ` <span class="tag tag-green">${d.activeQuests.length} active</span>` : ''}</div>
          ${questCards || '<div class="empty">No active quests</div>'}
          ${completedCards ? `
            <div class="quest-completed-section">
              <div class="section-title quest-completed-toggle" onclick="document.getElementById('completed-quests-list').classList.toggle('hidden')">
                <span style="font-size:11px">&#9660;</span> Recently Completed <span class="tag tag-purple">${d.completedQuests.length}</span>
              </div>
              <div id="completed-quests-list"${completedWasHidden ? ' class="hidden"' : ''}>${completedCards}</div>
            </div>
          ` : ''}
        </div>
        <div class="section">
          <div class="section-title">Recent Dispatches</div>
          ${dispatchRows || '<div class="empty">No recent dispatches</div>'}
        </div>
      `;
    }

    function renderJiraTickets(d) {
      const COLS = [
        { status: 'Backlog',     icon: '📋', cls: 'kanban-col--yellow', tagCls: 'tag-yellow' },
        { status: 'In Progress', icon: '🔨', cls: 'kanban-col--blue', tagCls: 'tag-blue' },
        { status: 'In Review',   icon: '👀', cls: 'kanban-col--purple', tagCls: 'tag-purple' },
        { status: 'IN TESTING',  icon: '🧪', cls: 'kanban-col--cyan', tagCls: 'tag-cyan' },
      ];
      const tickets = d.jiraTickets ?? [];
      if (!tickets.length) return '<div class="empty">No active tickets</div>';

      const groups = {};
      for (const t of tickets) groups[t.status] = (groups[t.status] ?? []).concat(t);

      return '<div class="kanban">' + COLS.map(c => {
        const items = groups[c.status] ?? [];
        const cards = items.map(t => {
          const comment = t.lastComment
            ? `<div class="kanban-card-meta">💬 ${esc(t.lastComment.author)}: ${esc(t.lastComment.body)}</div>`
            : '';
          return `
            <div class="kanban-card">
              <div><a href="https://circlepay.atlassian.net/browse/${esc(t.key)}" target="_blank" class="kanban-card-key" style="color:var(--blue)">${esc(t.key)}</a> <span class="kanban-card-meta">${esc(t.updatedAgo)}</span></div>
              <div class="kanban-card-summary">${esc(t.summary)}</div>
              ${comment}
            </div>
          `;
        }).join('');
        return `
          <div class="kanban-col ${c.cls}">
            <div class="kanban-header">${c.icon} ${esc(c.status)} <span class="tag ${c.tagCls}">${items.length}</span></div>
            ${cards}
          </div>
        `;
      }).join('') + '</div>';
    }

    function renderRight(d) {
      // Meetings
      const meetings = (d.meetings ?? []).map(m => {
        const start = new Date(m.start);
        const end = new Date(m.end);
        const now = Date.now();
        const inProgress = now >= start.getTime() && now <= end.getTime();
        const time = start.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        const transcriptTag = m.transcript_available ? ' <span class="tag tag-cyan">transcript</span>' : '';
        const statusTag = inProgress
          ? '<span class="tag tag-green" style="margin-left:6px">now</span>'
          : m.notified ? ' <span class="tag tag-green">notified</span>' : '';
        const titleHtml = m.meetingUrl
          ? `<a href="${esc(m.meetingUrl)}" target="_blank">${esc(m.title)}</a>`
          : esc(m.title);
        return `
          <div class="side-row">
            <span style="color:var(--yellow);font-weight:600;margin-right:8px;white-space:nowrap">${time}</span> ${titleHtml}${statusTag}${transcriptTag}
            ${m.location && !m.meetingUrl ? `<div class="side-muted">${esc(m.location)}</div>` : ''}
          </div>
        `;
      }).join('');

      // Open PRs
      const PR_STATUS = {
        ok:                 { icon: '✅', cls: 'tag-green' },
        ci_failing:         { icon: '🔴', cls: 'tag-red' },
        conflict:           { icon: '💥', cls: 'tag-red' },
        behind:             { icon: '⏳', cls: 'tag-yellow' },
        changes_requested:  { icon: '🔄', cls: 'tag-orange' },
        ready:              { icon: '🚀', cls: 'tag-green' },
        'awaiting review':  { icon: '👀', cls: 'tag-purple' },
      };
      const inflightSet = new Set(d.inflightPrs ?? []);
      const claimedSet = new Set(d.claimedPrs ?? []);
      const prRows = (d.openPrs ?? []).map(pr => {
        const s = PR_STATUS[pr.status] ?? { icon: '❓', cls: 'tag-blue' };
        const signalId = `github:pr:crcl-main/${pr.repo}/${pr.number}`;
        const working = inflightSet.has(signalId) ? ' 🦝' : '';
        const approved = pr.approved ? ' ✓' : '';
        const claimed = claimedSet.has(signalId);
        const claimBtn = `<button onclick="toggleClaim('${signalId}', ${claimed})" class="claim-btn ${claimed ? 'claimed' : 'unclaimed'}" title="${claimed ? 'Release — let Franklin handle' : 'Claim — I\'ll handle this'}">${claimed ? 'claimed' : 'claim'}</button>`;
        return `
          <div class="side-row" style="font-size:11px${claimed ? ';opacity:0.5' : ''}">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span><span title="${esc(pr.status)}">${s.icon}</span> <a href="${esc(pr.url)}" target="_blank" style="color:var(--blue)">${esc(pr.repo)}#${pr.number}</a></span>
              <span style="color:var(--muted)">${approved}${working}${claimBtn}</span>
            </div>
          </div>
        `;
      }).join('');

      // Review requests
      const reviewRows = (d.reviewRequests ?? []).map(rr => {
        const statusTag = rr.reviewedByMe
          ? '<span class="tag tag-green">reviewed</span>'
          : '<span class="tag tag-yellow">pending</span>';
        return `
          <div class="side-row" style="font-size:11px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span><a href="${esc(rr.url)}" target="_blank" style="color:var(--blue)">${esc(rr.repo)}#${rr.number}</a></span>
              ${statusTag}
            </div>
            <div class="side-muted">${esc(rr.author)} &middot; ${esc(rr.updatedAgo)}</div>
          </div>
        `;
      }).join('');

      // Deploys
      const DEPLOY_STATUS = {
        pending:  { icon: '🔶', cls: 'tag-yellow' },
        approved: { icon: '✅', cls: 'tag-green' },
      };
      window.__deploys = d.deploys ?? [];
      const deployRows = (d.deploys ?? []).map((dep, i) => {
        const s = DEPLOY_STATUS[dep.status] ?? DEPLOY_STATUS.pending;
        return `
          <div class="side-row" style="font-size:11px;cursor:pointer" onclick="showDeployModal(${i})">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span>${s.icon} ${esc(dep.service)}</span>
              <span class="tag ${s.cls}">${esc(dep.status ?? 'pending')}</span>
            </div>
            <div class="side-muted">${esc(dep.requester ?? '')} &middot; ${esc(dep.createdAgo)}</div>
          </div>
        `;
      }).join('');

      document.getElementById('col-right').innerHTML = `
        <div class="section">
          <div class="section-title">Meetings</div>
          ${meetings || '<div class="empty">None upcoming</div>'}
        </div>
        <div class="section">
          <div class="section-title">Open PRs${d.openPrs?.length ? ` <span class="tag tag-blue">${d.openPrs.length}</span>` : ''}</div>
          ${prRows || '<div class="empty">No open PRs</div>'}
        </div>
        <div class="section">
          <div class="section-title">Reviews${d.reviewRequests?.length ? ` <span class="tag tag-blue">${d.reviewRequests.length}</span>` : ''}</div>
          ${reviewRows || '<div class="empty">None pending</div>'}
        </div>
        <div class="section">
          <div class="section-title">Deploys${d.deploys?.length ? ` <span class="tag tag-blue">${d.deploys.length}</span>` : ''}</div>
          ${deployRows || '<div class="empty">None recent</div>'}
        </div>
      `;
    }

    async function refresh() {
      const el = document.getElementById('refresh');
      try {
        const data = await fetch('/api/state').then(r => r.json());
        renderLeft(data);
        renderMain(data);
        renderRight(data);
        el.textContent = `updated ${new Date().toLocaleTimeString()}`;
        document.querySelector('.layout').classList.add('flash');
        setTimeout(() => document.querySelector('.layout').classList.remove('flash'), 400);
      } catch {
        el.textContent = 'error -- retrying...';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('deploy-modal').classList.remove('open');
        document.getElementById('quest-modal').classList.remove('open');
      }
    });

    // ── Metrics widget ──────────────────────────────────────────────────────
    let metricsCache = null;

    async function fetchMetrics() {
      try {
        metricsCache = await fetch('/api/metrics').then(r => r.json());
        renderHeaderMetrics();
      } catch {}
    }

    function renderHeaderMetrics() {
      const el = document.getElementById('header-metrics');
      if (!metricsCache) { el.innerHTML = ''; return; }
      const all = metricsCache.periods.all;
      const week = metricsCache.periods.week;
      if (!all) { el.innerHTML = ''; return; }

      const items = [
        { emoji: '✅', label: 'Tasks completed', val: all.tasks, weekVal: week?.tasks, color: 'var(--green)' },
        { emoji: '🗡️', label: 'Quests completed', val: all.quests, weekVal: week?.quests, color: 'var(--purple)' },
        { emoji: '💬', label: 'Messages sent', val: all.messagesSent, weekVal: week?.messagesSent, color: 'var(--cyan)' },
        { emoji: '🚀', label: 'Deploys reviewed', val: all.deploys, weekVal: week?.deploys, color: 'var(--blue)' },
      ];

      el.innerHTML = items.map(m => {
        const tip = `${m.label}: ${m.val} total` + (m.weekVal ? `, ${m.weekVal} this week` : '');
        return `
          <div class="hm" title="${tip}">
            <span class="hm-emoji">${m.emoji}</span>
            <span class="hm-val" style="color:${m.color}">${m.val}</span>
          </div>
        `;
      }).join('');
    }

    async function fetchDeepSeekBalance() {
      try {
        const data = await fetch('/api/deepseek-balance').then(r => r.json());
        const info = data.balance_infos?.[0];
        const el = document.getElementById('deepseek-balance');
        if (!el) return;
        if (info) {
          el.textContent = `$${parseFloat(info.total_balance).toFixed(2)}`;
          el.title = `DeepSeek balance: $${info.total_balance} USD`;
        } else {
          el.textContent = 'err';
        }
      } catch {}
    }

    refresh();
    fetchMetrics();
    fetchDeepSeekBalance();
    setInterval(refresh, 10000);
    setInterval(fetchMetrics, 60000);
    setInterval(fetchDeepSeekBalance, 300000);
  </script>
</body>
</html>
