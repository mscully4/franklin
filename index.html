<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Franklin</title>
  <link rel="icon" type="image/png" href="/avatar.png">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #d29922;
      --blue: #58a6ff;
      --purple: #bc8cff;
      --orange: #f0883e;
      --cyan: #39d2c0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
    header h1 img { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); }
    #header-metrics { display: flex; align-items: center; gap: 16px; }
    .hm { display: flex; align-items: center; gap: 4px; font-size: 12px; }
    .hm-val { font-weight: 700; }
    .hm-week { color: var(--muted); font-size: 10px; }
    #refresh { font-size: 11px; color: var(--muted); }

    .layout {
      display: grid;
      grid-template-columns: 240px 1fr 280px;
      gap: 1px;
      background: var(--border);
      min-height: calc(100vh - 41px);
    }
    .col { background: var(--surface); padding: 14px 16px; overflow-y: auto; }

    .section-title {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .section + .section { margin-top: 20px; }

    .status-line { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .dot-red { background: var(--red); }
    .dot-yellow { background: var(--yellow); }
    .kv { margin-bottom: 4px; }
    .kv-label { color: var(--muted); }
    .kv-value { color: var(--text); }

    .tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .tag-green { background: rgba(63,185,80,.15); color: var(--green); }
    .tag-red { background: rgba(248,81,73,.15); color: var(--red); }
    .tag-yellow { background: rgba(210,153,34,.15); color: var(--yellow); }
    .tag-blue { background: rgba(88,166,255,.15); color: var(--blue); }
    .tag-purple { background: rgba(188,140,255,.15); color: var(--purple); }
    .tag-cyan { background: rgba(57,210,192,.15); color: var(--cyan); }
    .tag-orange { background: rgba(240,136,62,.15); color: var(--orange); }
    .claim-btn {
      display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px;
      font-weight: 600; letter-spacing: 0.3px; cursor: pointer; border: none;
      font-family: inherit;
    }
    .claim-btn.unclaimed { background: rgba(139,148,158,.1); color: var(--muted); }
    .claim-btn.unclaimed:hover { background: rgba(139,148,158,.25); color: var(--text); }
    .claim-btn.claimed { background: rgba(210,153,34,.15); color: var(--yellow); }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .row:last-child { border-bottom: none; }

    .quest-card {
      border: 1px solid var(--border);
      border-radius: 5px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .quest-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .quest-id { color: var(--purple); font-weight: 600; }
    .quest-age { color: var(--muted); font-size: 11px; }
    .quest-obj { padding: 7px 10px; font-size: 12px; color: var(--text); }
    .quest-logs { padding: 0 10px 7px; }
    .log-entry {
      padding: 3px 0;
      border-top: 1px solid var(--border);
      font-size: 11px;
      line-height: 1.4;
    }
    .log-ago { color: var(--muted); margin-right: 5px; }
    .log-action { color: var(--orange); margin-right: 5px; }

    .quest-completed-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 12px; }
    .quest-completed-toggle { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 6px; }
    .quest-completed-toggle:hover { color: var(--text); }
    .quest-card-completed {
      border: 1px solid var(--border); border-radius: 5px; margin-bottom: 8px;
      overflow: hidden; opacity: 0.55; transition: opacity 0.15s ease;
    }
    .quest-card-completed:hover { opacity: 0.85; }
    .quest-card-completed .quest-head { padding: 5px 10px; }
    .quest-detail {
      padding: 4px 10px; font-size: 11px; color: var(--muted); cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4;
      border-top: 1px solid var(--border);
    }
    .quest-detail.expanded { white-space: normal; }
    .quest-detail-label { color: var(--purple); font-weight: 600; margin-right: 4px; }

    .dispatch-row {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .dispatch-row:last-child { border-bottom: none; }
    .dispatch-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .dispatch-summary {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .side-row {
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .side-row:last-child { border-bottom: none; }
    .side-muted { color: var(--muted); font-size: 11px; margin-top: 1px; }
    .hidden { display: none; }

    .tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 7px 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: -1px;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
    .tab-count {
      padding: 0 5px;
      border-radius: 8px;
      font-size: 9px;
      font-weight: 600;
      background: rgba(139,148,158,.12);
      color: var(--muted);
    }
    .tab.active .tab-count { background: rgba(57,210,192,.15); color: var(--cyan); }

    .empty { color: var(--muted); font-style: italic; font-size: 12px; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .kanban { display: flex; gap: 8px; overflow-x: auto; }
    .kanban-col { flex: 1; min-width: 140px; }
    .kanban-header {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--muted); font-weight: 600; margin-bottom: 6px;
      display: flex; align-items: center; gap: 5px;
    }
    .kanban-header .tag { font-size: 9px; }
    .kanban-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      margin-bottom: 6px;
      background: var(--bg);
      font-size: 11px;
      line-height: 1.4;
    }
    .kanban-card:hover { border-color: var(--muted); }
    .kanban-card-key { font-weight: 600; }
    .kanban-card-summary {
      color: var(--text); margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .kanban-card-meta { color: var(--muted); font-size: 10px; margin-top: 3px; }
    .kanban-col--blue .kanban-card { border-left: 2px solid var(--blue); }
    .kanban-col--purple .kanban-card { border-left: 2px solid var(--purple); }
    .kanban-col--cyan .kanban-card { border-left: 2px solid var(--cyan); }
    .kanban-col--yellow .kanban-card { border-left: 2px solid var(--yellow); }

    .metric-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 3px 0; font-size: 12px;
    }
    .metric-val { font-weight: 700; }
    @keyframes fadein { from { opacity: 0.4; } to { opacity: 1; } }
    .flash { animation: fadein 0.4s ease; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 520px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .modal-head h2 { font-size: 14px; font-weight: 600; }
    .modal-close {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 18px; line-height: 1; padding: 0 4px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-section { margin-bottom: 12px; }
    .modal-section-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--muted); font-weight: 600; margin-bottom: 6px;
    }
    .modal-kv {
      display: flex; justify-content: space-between; gap: 12px;
      padding: 4px 0; border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .modal-kv:last-child { border-bottom: none; }
    .modal-kv-label { color: var(--muted); white-space: nowrap; }
    .modal-kv-value { color: var(--text); text-align: right; word-break: break-word; }
  </style>
</head>
<body>
  <header>
    <h1><img src="/avatar.png" alt="Franklin">Franklin</h1>
    <div id="header-metrics"></div>
    <div id="refresh">loading...</div>
  </header>

  <div class="modal-overlay" id="usage-modal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal" style="max-width:640px">
      <div class="modal-head">
        <h2>Token Usage</h2>
        <button class="modal-close" onclick="document.getElementById('usage-modal').classList.remove('open')">&times;</button>
      </div>
      <div id="usage-modal-body"></div>
    </div>
  </div>

  <div class="modal-overlay" id="quest-modal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal" style="max-width:720px;width:720px">
      <div class="modal-head">
        <h2 id="quest-modal-title"></h2>
        <span style="display:flex;align-items:center;gap:8px">
          <button id="quest-modal-toggle" class="tag tag-blue" style="cursor:pointer;border:none;font-family:inherit" onclick="toggleQuestModalView()">Raw JSON</button>
          <button class="modal-close" onclick="document.getElementById('quest-modal').classList.remove('open')">&times;</button>
        </span>
      </div>
      <div id="quest-modal-body"></div>
      <pre id="quest-modal-raw" class="hidden" style="font-size:11px;color:var(--text);overflow:auto;max-height:70vh;margin:0;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;white-space:pre-wrap;word-break:break-word"></pre>
    </div>
  </div>

  <div class="modal-overlay" id="deploy-modal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal">
      <div class="modal-head">
        <h2 id="deploy-modal-title"></h2>
        <button class="modal-close" onclick="document.getElementById('deploy-modal').classList.remove('open')">&times;</button>
      </div>
      <div id="deploy-modal-body"></div>
    </div>
  </div>

  <div class="layout">
    <div class="col" id="col-left"></div>
    <div class="col" id="col-main"></div>
    <div class="col" id="col-right"></div>
  </div>

  <script>
    function esc(s) {
      return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function toggleClaim(signalId, currently_claimed) {
      const method = currently_claimed ? 'DELETE' : 'POST';
      await fetch('/api/claim-pr', { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify({ signalId }) });
      refresh();
    }

    function timeAgoClient(iso) {
      if (!iso) return 'never';
      const s = (Date.now() - new Date(iso).getTime()) / 1000;
      if (s < 60) return `${Math.floor(s)}s ago`;
      if (s < 3600) return `${Math.floor(s / 60)}m ago`;
      if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
      return `${Math.floor(s / 86400)}d ago`;
    }

    const QUEST_STATUS_TAG = {
      completed:   'tag-green',
      failed:      'tag-red',
      error:       'tag-red',
      timeout:     'tag-red',
      cancelled:   'tag-red',
      in_progress: 'tag-blue',
      running:     'tag-green',
      pending:     'tag-yellow',
    };

    const ACTION_COLOR = {
      note:          'var(--muted)',
      message_sent:  'var(--cyan)',
      info_received: 'var(--blue)',
      decision:      'var(--purple)',
      error:         'var(--red)',
      escalation:    'var(--orange)',
      completion:    'var(--green)',
    };

    function renderQuestDetail(q) {
      const raw = q.raw ?? {};
      const ctx = raw.context ?? {};
      const source = raw.source ?? {};
      const approach = Array.isArray(raw.approach) ? raw.approach : (Array.isArray(ctx.approach) ? ctx.approach : []);
      const logs = q.recentLogs ?? [];
      let out = '';

      if (q.objective || raw.objective) {
        out += `<div class="modal-section"><div class="modal-section-title">Objective</div>`;
        out += `<div style="font-size:12px;color:var(--text);line-height:1.5">${esc(q.objective ?? raw.objective)}</div></div>`;
      }

      if (approach.length) {
        out += `<div class="modal-section"><div class="modal-section-title">Approach</div>`;
        out += `<ol style="font-size:12px;color:var(--text);padding-left:20px;line-height:1.5">`;
        out += approach.map(s => `<li style="margin-bottom:4px">${esc(s)}</li>`).join('');
        out += `</ol></div>`;
      }

      const sourceRows = [];
      if (raw.requested_by) sourceRows.push(['Requested by', esc(raw.requested_by)]);
      if (source.platform) sourceRows.push(['Platform', esc(source.platform)]);
      if (source.task_id) sourceRows.push(['Source task', esc(source.task_id)]);
      if (ctx.signal_id) sourceRows.push(['Signal', esc(ctx.signal_id)]);
      if (ctx.channel_id) sourceRows.push(['Channel', esc(ctx.channel_id)]);
      if (sourceRows.length) {
        out += `<div class="modal-section"><div class="modal-section-title">Source</div>`;
        out += sourceRows.map(([k, v]) =>
          `<div class="modal-kv"><span class="modal-kv-label">${k}</span><span class="modal-kv-value">${v}</span></div>`
        ).join('');
        out += `</div>`;
      }

      const workerRows = [];
      if (raw.sandbox_path) workerRows.push(['Sandbox', `<code style="font-size:11px">${esc(raw.sandbox_path)}</code>`]);
      if (q.costUSD != null) workerRows.push(['Cost', `<span style="color:var(--yellow);font-weight:700">$${q.costUSD.toFixed(2)}</span>`]);
      if (q.prUrl ?? raw.pr_url) {
        const url = q.prUrl ?? raw.pr_url;
        workerRows.push(['PR', `<a href="${esc(url)}" target="_blank">${esc(url)}</a>`]);
      }
      if (raw.agent_status) workerRows.push(['Agent status', esc(raw.agent_status)]);
      if (workerRows.length) {
        out += `<div class="modal-section"><div class="modal-section-title">Worker</div>`;
        out += workerRows.map(([k, v]) =>
          `<div class="modal-kv"><span class="modal-kv-label">${k}</span><span class="modal-kv-value">${v}</span></div>`
        ).join('');
        out += `</div>`;
      }

      if (raw.outcome) {
        out += `<div class="modal-section"><div class="modal-section-title">Outcome</div>`;
        out += `<div style="font-size:12px;color:var(--text);line-height:1.5;white-space:pre-wrap;word-break:break-word">${esc(raw.outcome)}</div></div>`;
      }

      if (logs.length) {
        out += `<div class="modal-section"><div class="modal-section-title">Timeline <span class="tag tag-purple" style="margin-left:4px">${logs.length}</span></div>`;
        out += `<div style="max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:4px">`;
        out += logs.map(e => {
          const color = ACTION_COLOR[e.action] ?? 'var(--orange)';
          return `
            <div style="padding:6px 10px;border-bottom:1px solid var(--border);font-size:11px;line-height:1.4">
              <div style="display:flex;gap:8px;align-items:baseline">
                <span style="color:var(--muted);white-space:nowrap;min-width:60px">${esc(e.ago)}</span>
                <span style="color:${color};font-weight:600;white-space:nowrap">[${esc(e.action)}]</span>
                <span style="color:var(--text);word-break:break-word">${esc(e.summary)}</span>
              </div>
            </div>
          `;
        }).join('');
        out += `</div></div>`;
      }

      return out;
    }

    function setActiveTab(name) {
      try { localStorage.setItem('franklin.activeTab', name); } catch { /* private mode */ }
      document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('hidden', p.id !== 'tab-' + name));
    }

    let _activeQuestForModal = null;

    function showQuestDetail(q) {
      _activeQuestForModal = q;
      const raw = q.raw ?? q;
      const statusCls = QUEST_STATUS_TAG[q.status ?? raw.status] ?? 'tag-blue';
      const status = q.status ?? raw.status ?? '';
      const category = q.category ?? raw.category;
      document.getElementById('quest-modal-title').innerHTML =
        `${esc(q.id ?? raw.id ?? 'Quest')} ${status ? `<span class="tag ${statusCls}" style="margin-left:8px">${esc(status)}</span>` : ''}${category ? ` <span class="tag tag-cyan" style="margin-left:4px">${esc(category)}</span>` : ''}`;
      document.getElementById('quest-modal-body').innerHTML = renderQuestDetail(q);
      document.getElementById('quest-modal-raw').textContent = JSON.stringify(raw, null, 2);
      document.getElementById('quest-modal-body').classList.remove('hidden');
      document.getElementById('quest-modal-raw').classList.add('hidden');
      document.getElementById('quest-modal-toggle').textContent = 'Raw JSON';
      document.getElementById('quest-modal').classList.add('open');
    }

    function toggleQuestModalView() {
      const body = document.getElementById('quest-modal-body');
      const raw = document.getElementById('quest-modal-raw');
      const btn = document.getElementById('quest-modal-toggle');
      if (body.classList.contains('hidden')) {
        body.classList.remove('hidden');
        raw.classList.add('hidden');
        btn.textContent = 'Raw JSON';
      } else {
        body.classList.add('hidden');
        raw.classList.remove('hidden');
        btn.textContent = 'Structured';
      }
    }

    function showDeployModal(idx) {
      const dep = window.__deploys[idx];
      if (!dep) return;
      const DEPLOY_ST = {
        pending:  { icon: '🔶', cls: 'tag-yellow' },
        approved: { icon: '✅', cls: 'tag-green' },
      };
      const r = DEPLOY_ST[dep.status] ?? DEPLOY_ST.pending;
      document.getElementById('deploy-modal-title').innerHTML =
        `${r.icon} ${esc(dep.service)} <span class="tag ${r.cls}" style="margin-left:8px">${esc(dep.status ?? 'pending')}</span>`;

      let body = '';

      // Summary row
      body += `<div class="modal-section">`;
      if (dep.requester) body += `<div class="modal-kv"><span class="modal-kv-label">Requester</span><span class="modal-kv-value">${esc(dep.requester)}</span></div>`;
      body += `<div class="modal-kv"><span class="modal-kv-label">Time</span><span class="modal-kv-value">${esc(dep.createdAgo)}</span></div>`;
      if (dep.message_url) body += `<div class="modal-kv"><span class="modal-kv-label">Message</span><span class="modal-kv-value"><a href="${esc(dep.message_url)}">View message</a></span></div>`;
      body += `</div>`;

      // Description
      if (dep.description) {
        body += `<div class="modal-section"><div class="modal-section-title">Description</div><div style="font-size:12px;color:var(--text)">${esc(dep.description)}</div></div>`;
      }

      // Evidence
      if (dep.evidence) {
        body += `<div class="modal-section"><div class="modal-section-title">Evidence</div>`;
        try {
          const ev = typeof dep.evidence === 'string' ? JSON.parse(dep.evidence) : dep.evidence;
          for (const [k, v] of Object.entries(ev)) {
            const label = k.replace(/_/g, ' ');
            let val;
            if (typeof v === 'object' && v !== null) {
              // Render nested objects as sub-rows
              val = Object.entries(v).map(([sk, sv]) => `${esc(sk)}: ${esc(String(sv))}`).join('<br>');
            } else {
              val = esc(String(v));
            }
            body += `<div class="modal-kv"><span class="modal-kv-label">${esc(label)}</span><span class="modal-kv-value">${val}</span></div>`;
          }
        } catch {
          body += `<div style="font-size:12px;color:var(--text);white-space:pre-wrap">${esc(String(dep.evidence))}</div>`;
        }
        body += `</div>`;
      }

      document.getElementById('deploy-modal-body').innerHTML = body;
      document.getElementById('deploy-modal').classList.add('open');
    }

    const STATUS_TAG = {
      ok:         'tag-green',
      skipped:    'tag-blue',
      error:      'tag-red',
      timeout:    'tag-red',
      no_worker:  'tag-yellow',
      needs_info: 'tag-cyan',
    };

    function renderLeft(d) {
      // Process status
      const processDot = d.running
        ? `<span class="dot dot-green"></span><span style="color:var(--green)">RUNNING</span>`
        : `<span class="dot dot-red"></span><span style="color:var(--red)">STOPPED</span>`;

      // Socket status
      const socketOk = d.socketStatus === 'connected' && !d.socketStale;
      const socketDot = socketOk
        ? `<span class="dot dot-green"></span><span style="color:var(--green)">connected</span>`
        : `<span class="dot dot-red"></span><span style="color:var(--red)">${esc(d.socketStatus)}</span>`;

      // Scouts
      const scouts = d.scouts.map(s => `
        <div class="row">
          <span style="color:var(--blue);font-size:12px">${s.name}</span>
          <span style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
            <span style="color:var(--muted);font-size:11px">${s.lastAgo}</span>
            <span class="tag ${s.overdue ? 'tag-yellow' : 'tag-green'}">${s.overdue ? 'overdue' : 'ok'}</span>
          </span>
        </div>
      `).join('');

      document.getElementById('col-left').innerHTML = `
        <div class="section">
          <div class="section-title">Process</div>
          <div class="status-line">${processDot}</div>
          <div class="kv"><span class="kv-label">heartbeat </span><span class="kv-value">${d.heartbeatAgo}</span></div>
          <div class="kv"><span class="kv-label">last cycle </span><span class="kv-value">${d.lastCycleAgo}</span></div>
        </div>
        <div class="section">
          <div class="section-title">Socket</div>
          <div class="status-line">${socketDot}</div>
          <div class="kv"><span class="kv-label">updated </span><span class="kv-value">${d.socketAgo}</span></div>
        </div>
        <div class="section">
          <div class="section-title">Scouts</div>
          ${scouts}
        </div>
      `;
    }

    function renderMain(d) {
      window.__quests = [];

      // Active quest cards
      const questCards = d.activeQuests.map((q) => {
        window.__quests.push(q);
        const qIdx = window.__quests.length - 1;
        const isScheduled = q.raw?.requested_by === 'scheduled';
        const schedName = isScheduled ? (q.raw?.context?.scheduled_task_id ?? 'scheduled') : '';
        const modelShort = q.workerModel ? q.workerModel.replace(/^claude-/, '') : null;
        const tags = [
          q.agentStatus === 'running' ? `<span class="tag tag-green">running</span>` : '',
          `<span class="tag tag-purple">${esc(q.status)}</span>`,
          isScheduled ? `<span class="tag" style="color:var(--muted)" title="Scheduled task: ${esc(schedName)}">⏱ ${esc(schedName)}</span>` : '',
          q.category ? `<span class="tag tag-cyan" title="Quest category">${esc(q.category)}</span>` : '',
          q.prUrl ? `<a href="${esc(q.prUrl)}" target="_blank" class="tag tag-blue">PR</a>` : '',
          q.costUSD != null ? `<span class="tag tag-yellow" title="Total cost for this quest">$${q.costUSD.toFixed(2)}</span>` : '',
          modelShort ? `<span class="tag" style="color:var(--muted)" title="Worker model">${esc(modelShort)}</span>` : '',
          q.provider && q.provider !== 'claude' ? `<span class="tag tag-orange" title="Provider">${esc(q.provider)}</span>` : '',
        ].filter(Boolean).join(' ');

        const logs = q.recentLogs.map(l => `
          <div class="log-entry">
            <span class="log-ago">${l.ago}</span>
            <span class="log-action">[${esc(l.action)}]</span>
            <span>${esc(l.summary)}</span>
          </div>
        `).join('');

        return `
          <div class="quest-card" style="cursor:pointer" onclick="showQuestDetail(window.__quests[${qIdx}])">
            <div class="quest-head">
              <span><span class="quest-id">${esc(q.id)}</span> <span class="quest-age">${q.createdAgo}</span></span>
              <span>${tags}</span>
            </div>
            <div class="quest-obj">${esc(q.objective)}</div>
            ${logs ? `<div class="quest-logs">${logs}</div>` : ''}
          </div>
        `;
      }).join('');

      // Completed quest cards
      const completedCards = (d.completedQuests ?? []).map(q => {
        window.__quests.push(q);
        const qIdx = window.__quests.length - 1;
        const statusTag = q.status === 'completed'
          ? '<span class="tag tag-green">completed</span>'
          : `<span class="tag tag-red">${esc(q.status)}</span>`;
        const isScheduled = q.raw?.requested_by === 'scheduled';
        const schedName2 = isScheduled ? (q.raw?.context?.scheduled_task_id ?? 'scheduled') : '';
        const categoryTag = q.category ? ` <span class="tag tag-cyan">${esc(q.category)}</span>` : '';
        const scheduledTag = isScheduled ? ` <span class="tag" style="color:var(--muted)" title="Scheduled task: ${esc(schedName2)}">⏱ ${esc(schedName2)}</span>` : '';
        const prTag = q.prUrl ? ` <a href="${esc(q.prUrl)}" target="_blank" class="tag tag-blue">PR</a>` : '';
        const costTag = q.costUSD != null ? ` <span class="tag tag-yellow" title="Total cost for this quest">$${q.costUSD.toFixed(2)}</span>` : '';
        const modelTag = q.workerModel ? ` <span class="tag" style="color:var(--muted)" title="Worker model">${esc(q.workerModel.replace(/^claude-/, ''))}</span>` : '';
        const providerTag = q.provider && q.provider !== 'claude' ? ` <span class="tag tag-orange" title="Provider">${esc(q.provider)}</span>` : '';
        return `
          <div class="quest-card-completed" style="cursor:pointer" onclick="showQuestDetail(window.__quests[${qIdx}])">
            <div class="quest-head">
              <span><span class="quest-id">${esc(q.id)}</span> <span class="quest-age">${q.updatedAgo}</span></span>
              <span>${statusTag}${scheduledTag}${categoryTag}${prTag}${costTag}${modelTag}${providerTag}</span>
            </div>
            <div class="quest-detail"><span class="quest-detail-label">objective</span> ${esc(q.objective)}</div>
            ${q.outcome ? `<div class="quest-detail"><span class="quest-detail-label">outcome</span> ${esc(q.outcome)}</div>` : ''}
          </div>
        `;
      }).join('');

      // DM replies tab
      const dmReplyRows = (d.recentDmReplies ?? []).map(r => {
        const cls = STATUS_TAG[r.status] ?? 'tag-blue';
        return `
          <div class="dispatch-row">
            <div class="dispatch-header">
              <span style="color:var(--muted);font-size:11px">${esc(r.task_id)}</span>
              <span style="display:flex;align-items:center;gap:6px">
                <span class="tag ${cls}">${esc(r.status)}</span>
                <span style="color:var(--muted);font-size:11px">${esc(r.completedAgo)}</span>
              </span>
            </div>
            ${r.summary ? `<div class="dispatch-summary">${esc(r.summary)}</div>` : ''}
          </div>
        `;
      }).join('');

      // Scheduled runs tab
      const scheduledRunRows = (d.recentScheduledRuns ?? []).map(r => {
        const cls = STATUS_TAG[r.status] ?? 'tag-blue';
        const schedTaskName = String(r.dedup_key ?? '').replace(/^sched:([^:]+).*$/, '$1') || String(r.task_id ?? '');
        const categoryTag = r.category
          ? `<span class="tag tag-cyan" title="Category">${esc(r.category)}</span>`
          : '';
        return `
          <div class="dispatch-row">
            <div class="dispatch-header">
              <span style="color:var(--cyan);font-weight:600">${esc(schedTaskName)}</span>
              <span style="display:flex;align-items:center;gap:6px">
                ${categoryTag}
                <span class="tag ${cls}">${esc(r.status)}</span>
                <span style="color:var(--muted);font-size:11px">${esc(r.completedAgo)}</span>
              </span>
            </div>
            ${r.summary ? `<div class="dispatch-summary">${esc(r.summary)}</div>` : ''}
          </div>
        `;
      }).join('');

      // All dispatches tab
      const dispatchRows = (d.recentDispatches ?? []).slice(0, 15).map(r => {
        const cls = STATUS_TAG[r.status] ?? 'tag-blue';
        return `
          <div class="dispatch-row">
            <div class="dispatch-header">
              <span>
                <span style="color:var(--orange)">${esc(r.type)}</span>
                <span style="color:var(--muted);font-size:11px;margin-left:6px">${esc(r.task_id)}</span>
              </span>
              <span style="display:flex;align-items:center;gap:6px">
                <span class="tag ${cls}">${esc(r.status)}</span>
                <span style="color:var(--muted);font-size:11px">${esc(r.completedAgo)}</span>
              </span>
            </div>
            ${r.summary ? `<div class="dispatch-summary">${esc(r.summary)}</div>` : ''}
          </div>
        `;
      }).join('');

      const completedWasHidden = document.getElementById('completed-quests-list')?.classList.contains('hidden') ?? false;

      let activeTab = 'quests';
      try { activeTab = localStorage.getItem('franklin.activeTab') || 'quests'; } catch { /* private mode */ }
      const TABS = [
        { id: 'quests',     label: 'Quests',         count: d.activeQuests?.length ?? 0 },
        { id: 'dm',         label: 'DM Replies',     count: d.recentDmReplies?.length ?? 0 },
        { id: 'scheduled',  label: 'Scheduled Runs', count: d.recentScheduledRuns?.length ?? 0 },
        { id: 'dispatches', label: 'Dispatches',     count: d.recentDispatches?.length ?? 0 },
      ];
      const tabBar = TABS.map(t => `
        <button class="tab ${t.id === activeTab ? 'active' : ''}" data-tab="${t.id}" onclick="setActiveTab('${t.id}')">
          ${t.label}${t.count > 0 ? ` <span class="tab-count">${t.count}</span>` : ''}
        </button>
      `).join('');

      const panelHidden = (id) => id === activeTab ? '' : ' hidden';

      document.getElementById('col-main').innerHTML = `
        <div class="section">
          <div class="tabs">${tabBar}</div>
          <div id="tab-quests" class="tab-panel${panelHidden('quests')}">
            ${questCards || '<div class="empty">No active quests</div>'}
            ${completedCards ? `
              <div class="quest-completed-section">
                <div class="section-title quest-completed-toggle" onclick="document.getElementById('completed-quests-list').classList.toggle('hidden')">
                  <span style="font-size:11px">&#9660;</span> Recently Completed <span class="tag tag-purple">${d.completedQuests.length}</span>
                </div>
                <div id="completed-quests-list"${completedWasHidden ? ' class="hidden"' : ''}>${completedCards}</div>
              </div>
            ` : ''}
          </div>
          <div id="tab-dm" class="tab-panel${panelHidden('dm')}">
            ${dmReplyRows || '<div class="empty">No recent DM replies</div>'}
          </div>
          <div id="tab-scheduled" class="tab-panel${panelHidden('scheduled')}">
            ${scheduledRunRows || '<div class="empty">No scheduled runs yet</div>'}
          </div>
          <div id="tab-dispatches" class="tab-panel${panelHidden('dispatches')}">
            ${dispatchRows || '<div class="empty">No recent dispatches</div>'}
          </div>
        </div>
      `;
    }

    function renderJiraTickets(d) {
      const COLS = [
        { status: 'Backlog',     icon: '📋', cls: 'kanban-col--yellow', tagCls: 'tag-yellow' },
        { status: 'In Progress', icon: '🔨', cls: 'kanban-col--blue', tagCls: 'tag-blue' },
        { status: 'In Review',   icon: '👀', cls: 'kanban-col--purple', tagCls: 'tag-purple' },
        { status: 'IN TESTING',  icon: '🧪', cls: 'kanban-col--cyan', tagCls: 'tag-cyan' },
      ];
      const tickets = d.jiraTickets ?? [];
      if (!tickets.length) return '<div class="empty">No active tickets</div>';

      const groups = {};
      for (const t of tickets) groups[t.status] = (groups[t.status] ?? []).concat(t);

      return '<div class="kanban">' + COLS.map(c => {
        const items = groups[c.status] ?? [];
        const cards = items.map(t => {
          const comment = t.lastComment
            ? `<div class="kanban-card-meta">💬 ${esc(t.lastComment.author)}: ${esc(t.lastComment.body)}</div>`
            : '';
          return `
            <div class="kanban-card">
              <div><a href="https://circlepay.atlassian.net/browse/${esc(t.key)}" target="_blank" class="kanban-card-key" style="color:var(--blue)">${esc(t.key)}</a> <span class="kanban-card-meta">${esc(t.updatedAgo)}</span></div>
              <div class="kanban-card-summary">${esc(t.summary)}</div>
              ${comment}
            </div>
          `;
        }).join('');
        return `
          <div class="kanban-col ${c.cls}">
            <div class="kanban-header">${c.icon} ${esc(c.status)} <span class="tag ${c.tagCls}">${items.length}</span></div>
            ${cards}
          </div>
        `;
      }).join('') + '</div>';
    }

    function renderRight(d) {
      // Scheduled tasks — preserve expanded state across refreshes
      const expandedTasks = new Set(
        document.querySelectorAll('.sched-detail:not(.hidden)')
      );
      const expandedIds = new Set();
      expandedTasks.forEach(el => {
        const row = el.closest('.side-row');
        if (row) expandedIds.add(row.dataset.taskId);
      });

      const scheduledRows = (d.scheduledTasks ?? []).map(t => {
        const kindTag = t.kind === 'script'
          ? '<span title="script">⚡</span>'
          : '<span title="worker">🧠</span>';
        const trippedTag = (t.failCount ?? 0) >= 3
          ? ' <span class="tag tag-red" title="Circuit breaker tripped after 3 consecutive failures. Reset fail_count to 0 to re-enable.">tripped</span>'
          : '';
        const detailClass = expandedIds.has(t.id) ? 'sched-detail' : 'sched-detail hidden';
        return `
          <div class="side-row" data-task-id="${esc(t.id)}" style="cursor:pointer" onclick="this.querySelector('.sched-detail').classList.toggle('hidden')">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="color:var(--cyan);font-weight:600">${esc(t.id)}${trippedTag}</span>
              <span style="display:flex;gap:4px">${kindTag}<span class="tag tag-purple">${esc(t.every)}</span></span>
            </div>
            <div class="${detailClass}">
              <div class="side-muted">${esc(t.description)}</div>
              <div class="side-muted">last run: ${esc(t.lastRunAgo)}</div>
            </div>
          </div>
        `;
      }).join('');

      window.__deploys = d.deploys ?? [];

      document.getElementById('col-right').innerHTML = `
        <div class="section">
          <div class="section-title">Scheduled Tasks</div>
          ${scheduledRows || '<div class="empty">None configured</div>'}
        </div>
      `;
    }

    async function refresh() {
      const el = document.getElementById('refresh');
      try {
        const data = await fetch('/api/state').then(r => r.json());
        renderLeft(data);
        renderMain(data);
        renderRight(data);
        el.textContent = `updated ${new Date().toLocaleTimeString()}`;
        document.querySelector('.layout').classList.add('flash');
        setTimeout(() => document.querySelector('.layout').classList.remove('flash'), 400);
      } catch {
        el.textContent = 'error -- retrying...';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('deploy-modal').classList.remove('open');
        document.getElementById('quest-modal').classList.remove('open');
        document.getElementById('usage-modal').classList.remove('open');
      }
    });

    // ── Metrics widget ──────────────────────────────────────────────────────
    let metricsCache = null;

    async function fetchMetrics() {
      try {
        metricsCache = await fetch('/api/metrics').then(r => r.json());
        renderHeaderMetrics();
      } catch {}
    }

    function fmtTokens(n) {
      if (!n) return '0';
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(0) + 'K';
      return String(n);
    }

    function renderUsageTable(periodData) {
      if (!periodData?.tokenUsage) return '<div class="empty">No data</div>';
      const models = Object.entries(periodData.tokenUsage)
        .sort((a, b) => b[1].costUSD - a[1].costUSD);
      if (!models.length) return '<div class="empty">No data</div>';
      const rows = models.map(([model, u]) => `
        <tr>
          <td style="color:var(--blue);white-space:nowrap">${esc(model)}</td>
          <td style="text-align:right;color:var(--muted)">${u.tasks}</td>
          <td style="text-align:right">${fmtTokens(u.inputTokens)}</td>
          <td style="text-align:right">${fmtTokens(u.outputTokens)}</td>
          <td style="text-align:right;color:var(--muted)">${fmtTokens(u.cacheReadInputTokens)}</td>
          <td style="text-align:right;color:var(--yellow);font-weight:600">$${u.costUSD.toFixed(2)}</td>
        </tr>
      `).join('');
      const total = periodData.totalCostUSD ?? 0;
      return `
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead>
            <tr style="color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:0.5px">
              <th style="text-align:left;padding:4px 0;border-bottom:1px solid var(--border)">Model</th>
              <th style="text-align:right;padding:4px 0;border-bottom:1px solid var(--border)">Tasks</th>
              <th style="text-align:right;padding:4px 0;border-bottom:1px solid var(--border)">Input</th>
              <th style="text-align:right;padding:4px 0;border-bottom:1px solid var(--border)">Output</th>
              <th style="text-align:right;padding:4px 0;border-bottom:1px solid var(--border)">Cache Read</th>
              <th style="text-align:right;padding:4px 0;border-bottom:1px solid var(--border)">Cost</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
          <tfoot>
            <tr style="border-top:1px solid var(--border)">
              <td colspan="5" style="padding:4px 0;color:var(--muted)">Total</td>
              <td style="text-align:right;padding:4px 0;color:var(--yellow);font-weight:700">$${total.toFixed(2)}</td>
            </tr>
          </tfoot>
        </table>
      `;
    }

    function openUsageModal() {
      if (!metricsCache) return;
      const periods = [
        { key: 'today', label: 'Today' },
        { key: 'week',  label: 'This Week' },
        { key: 'month', label: 'This Month' },
        { key: 'all',   label: 'All Time' },
      ];
      const body = periods.map(p => {
        const data = metricsCache.periods[p.key];
        const brain = data?.brain;
        const brainRow = (brain && brain.invocations > 0) ? `
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:4px 0;margin-bottom:4px;color:var(--muted)">
            <span>🧠 Brain &middot; ${brain.invocations} invocation${brain.invocations === 1 ? '' : 's'}</span>
            <span style="color:var(--yellow);font-weight:700">$${brain.costUSD.toFixed(2)}</span>
          </div>
        ` : '';
        return `
          <div class="modal-section">
            <div class="modal-section-title">${p.label}</div>
            ${brainRow}
            ${renderUsageTable(data)}
          </div>
        `;
      }).join('');
      document.getElementById('usage-modal-body').innerHTML = body;
      document.getElementById('usage-modal').classList.add('open');
    }

    function renderHeaderMetrics() {
      const el = document.getElementById('header-metrics');
      if (!metricsCache) { el.innerHTML = ''; return; }
      const all = metricsCache.periods.all;
      const week = metricsCache.periods.week;
      if (!all) { el.innerHTML = ''; return; }

      const weekCost = week?.totalCostUSD ?? 0;
      const allCost = all.totalCostUSD ?? 0;
      const costTip = `$${allCost.toFixed(2)} total · $${weekCost.toFixed(2)} this week — click for breakdown`;

      el.innerHTML = `
        <div class="hm" title="${costTip}" onclick="openUsageModal()" style="cursor:pointer">
          <span class="hm-val" style="color:var(--yellow)">$${weekCost.toFixed(2)}</span>
          <span class="hm-week">/ wk</span>
          <a href="/costs" title="Open cost dashboard" style="color:var(--yellow);margin-left:8px;font-size:11px;text-decoration:none;border:1px solid var(--yellow);border-radius:3px;padding:1px 5px;opacity:0.7" onclick="event.stopPropagation()">costs →</a>
        </div>
      `;
    }

    refresh();
    fetchMetrics();
    setInterval(refresh, 10000);
    setInterval(fetchMetrics, 60000);
  </script>
</body>
</html>
